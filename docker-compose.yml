services:
  jackett:
    image: linuxserver/jackett:latest
    container_name: jackett
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - jackett-config:/config
      - ${DOWNLOADS_PATH:-~/Downloads/torrents}:/downloads
    ports:
      - "9117:9117"
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - WEBUI_PORT=8080
    volumes:
      - qbit-config:/config
      - ${DOWNLOADS_PATH:-~/Downloads/torrents}:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped

  script:
    build: .
    container_name: autotorrent
    environment:
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY}
      - QBIT_URL=http://qbittorrent:8080
      - QBIT_USER=${QBIT_USER:-admin}
      - QBIT_PASS=${QBIT_PASS}
      - COLUMNS=${COLUMNS:-160}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./autotorrent.log:/app/autotorrent.log
    depends_on:
      - jackett
      - qbittorrent
    stdin_open: true
    tty: true
    profiles:
      - search

volumes:
  jackett-config:
  qbit-config:
